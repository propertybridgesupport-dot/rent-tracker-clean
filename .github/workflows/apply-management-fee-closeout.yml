name: Apply management fee closeout

on:
  push:
    branches:
      - feature/management-fee-closeout
    paths:
      - scripts/apply-management-fee-closeout.mjs
      - supabase/management_fee_closeout.sql
      - .github/workflows/apply-management-fee-closeout.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/management-fee-closeout
          fetch-depth: 0

      - name: Apply App.jsx changes
        run: node scripts/apply-management-fee-closeout.mjs

      - name: Validate app build
        run: |
          npm ci
          npm run build

      - name: Commit generated App.jsx update
        run: |
          if git diff --quiet -- src/App.jsx; then
            echo "No App.jsx changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.jsx
          git commit -m "Add management fee closeout and carry-forward"
          git push origin HEAD:feature/management-fee-closeout
