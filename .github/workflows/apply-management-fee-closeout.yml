name: Apply management fee closeout

on:
  push:
    branches:
      - feature/management-fee-closeout
    paths:
      - scripts/apply-management-fee-closeout.mjs
      - scripts/run-management-fee-closeout.mjs
      - supabase/management_fee_closeout.sql
      - .github/workflows/apply-management-fee-closeout.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/management-fee-closeout
          fetch-depth: 0

      - name: Apply App.jsx changes
        run: node scripts/run-management-fee-closeout.mjs

      - name: Install dependencies
        run: npm install

      - name: Validate app build
        run: npm run build

      - name: Commit generated app and build verification
        run: |
          printf "Management fee closeout build passed.\nCommit tested: %s\n" "$(git rev-parse HEAD)" > supabase/management_fee_closeout_build_verified.txt
          if git diff --quiet -- src/App.jsx supabase/management_fee_closeout_build_verified.txt; then
            echo "No generated changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.jsx supabase/management_fee_closeout_build_verified.txt
          git commit -m "Validate management fee closeout build"
          git push origin HEAD:feature/management-fee-closeout
